name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  front:
    name: Tests Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: histoMeca-front

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: histoMeca-front/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests
        run: npm run test:run

  back:
    name: Tests Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: histoMeca-back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: histoMeca-back/package-lock.json

      - name: Cache binaire MongoDB (mongodb-memory-server)
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-memory-server
          key: mongodb-memory-server-${{ runner.os }}-${{ hashFiles('histoMeca-back/package-lock.json') }}
          restore-keys: |
            mongodb-memory-server-${{ runner.os }}-

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests
        run: npm run test:run
